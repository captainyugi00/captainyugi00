name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Personal metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: captainyugi00
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Rome
          config_padding: 0, 8 + 11%

          repositories: 1000
          repositories_batch: 100
          repositories_affiliations: owner, collaborator, organization_member
          repositories_forks: yes

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_calendar: yes
          plugin_calendar_limit: 0

          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: no
          plugin_languages_sections: most-used
          plugin_languages_limit: 0
          plugin_languages_threshold: 0%

          plugin_lines: yes
          plugin_lines_sections: base, repositories, history
          plugin_lines_repositories_limit: 0
          plugin_lines_history_limit: 0

          plugin_stars: yes
          plugin_stars_limit: 100

          plugin_notable: yes
          plugin_notable_indepth: yes
          plugin_notable_filter: "all"
          plugin_notable_self: yes
          plugin_notable_types: commit, pull_request, issue

          plugin_followup: yes
          plugin_followup_sections: repositories, user
