name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Personal metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: captainyugi00
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Rome
          config_padding: 0, 8 + 11%

          repositories: 1000
          repositories_batch: 100
          repositories_affiliations: owner, collaborator, organization_member
          repositories_forks: yes

          commits_authoring: lilyoungpolo1@gmail.com, paolovergani003@gmail.com, captainyugi00, @users.noreply.github.com

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_calendar: yes
          plugin_calendar_limit: 0

          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 0
          plugin_languages_threshold: 0%
          plugin_languages_analysis_timeout: 60
          plugin_languages_analysis_timeout_repositories: 30

          plugin_lines: yes
          plugin_lines_history_limit: 0

          plugin_stars: yes
          plugin_stars_limit: 0

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed

          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          plugin_notable: yes
          plugin_notable_indepth: yes

          plugin_followup: yes
          plugin_followup_sections: repositories, user
